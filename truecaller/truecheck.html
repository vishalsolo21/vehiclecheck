<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Number Details Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    width:100%;
    max-width:600px;
    margin:30px auto;
    padding:15px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:25px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:20px;
    font-size:28px;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.loader{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#2563eb;
    font-weight:600;
}

.error{
    display:none;
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background:#fee2e2;
    color:#b91c1c;
    text-align:center;
    font-weight:600;
}

.result{
    display:none;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#2563eb;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
    word-break:break-word;
}

tr:nth-child(even){
    background:#f8fafc;
}

footer{
    margin-top:auto;
    text-align:center;
    padding:20px;
    color:#6b7280;
    font-size:14px;
}

.brand{
    color:#16a34a;
    font-weight:600;
}

@media(max-width:500px){
    .input-group{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <h1>📱 Mobile Details Checker</h1>

        <div class="input-group">
            <input
                type="tel"
                id="number"
                placeholder="Enter Mobile Number"
                maxlength="10"
            >
            <button onclick="checkNumber()">Check</button>
        </div>

        <div class="loader" id="loader">
            Fetching details...
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <table>
                <thead>
                    <tr>
                        <th>Field</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody id="tableData"></tbody>
            </table>
        </div>

    </div>
</div>

<footer>
    Made with ❤️ by Vishal |
    <span class="brand">RAIGANJLOOTERS</span>
</footer>
    <script>
async function checkNumber() {

    const number = document.getElementById("number").value.trim();

    if (!number || number.length !== 10) {
        showError("Please enter a valid 10-digit mobile number.");
        return;
    }

    document.getElementById("loader").style.display = "block";
    document.getElementById("error").style.display = "none";
    document.getElementById("result").style.display = "none";

    try {

        const response = await fetch(
            `https://corsproxy.io/?${encodeURIComponent(
                `https://ye-lo-mojkro.noob73613.workers.dev/?api_key=@noob11001&number=${number}`
            )}`
        );

        const data = await response.json();

        document.getElementById("loader").style.display = "none";

        if (!data.success || !data.first_match) {
            showError("❌ No data found.");
            return;
        }

        const result = data.first_match;

        const tableBody = document.getElementById("tableData");

        tableBody.innerHTML = `
            <tr>
                <td>Mobile</td>
                <td>${result.mobile || "N/A"}</td>
            </tr>
            <tr>
                <td>Name</td>
                <td>${result.name || "N/A"}</td>
            </tr>
            <tr>
                <td>Father's Name</td>
                <td>${result.fname || "N/A"}</td>
            </tr>
            <tr>
                <td>Address</td>
                <td>${result.address || "N/A"}</td>
            </tr>
            <tr>
                <td>Alternate Number</td>
                <td>${result.alt || "N/A"}</td>
            </tr>
            <tr>
                <td>Circle</td>
                <td>${result.circle || "N/A"}</td>
            </tr>
            <tr>
                <td>ID</td>
                <td>${result.id || "N/A"}</td>
            </tr>
            <tr>
                <td>Email</td>
                <td>${result.email || "N/A"}</td>
            </tr>
        `;

        document.getElementById("result").style.display = "block";

    } catch (error) {

        document.getElementById("loader").style.display = "none";

        showError("❌ Failed to fetch data.");
        console.error(error);
    }
}
</script>
</body>
</html>
