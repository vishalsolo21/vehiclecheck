<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Number Lookup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
.container{
    max-width:600px;
    width:100%;
    margin:30px auto;
    padding:15px;
}
.card{
    background:#fff;
    border-radius:16px;
    padding:25px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}
h1{
    text-align:center;
    margin-bottom:20px;
}
.input-group{
    display:flex;
    gap:10px;
}
input{
    flex:1;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
}
button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
.result{
    display:none;
    margin-top:20px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    padding:12px;
    border:1px solid #eee;
}
th{
    background:#2563eb;
    color:white;
}
.error{
    display:none;
    margin-top:15px;
    color:#b91c1c;
}
footer{
    margin-top:auto;
    text-align:center;
    padding:20px;
}
.brand{
    color:#16a34a;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📱 Mobile Lookup</h1>

        <div class="input-group">
            <input type="tel" id="number" placeholder="Enter Mobile Number">
            <button onclick="checkNumber()">Check</button>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <table>
                <thead>
                    <tr>
                        <th>Field</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody id="tableData"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    Made with ❤️ by Vishal |
    <span class="brand">RAIGANJLOOTERS</span>
</footer>

<script>
async function checkNumber() {
    const number = document.getElementById("number").value.trim();

    try {
        const response = await fetch(
            `https://corsproxy.io/?${encodeURIComponent(
                `YOUR_API_URL?number=${number}`
            )}`
        );

        const data = await response.json();

        const tableBody = document.getElementById("tableData");

        tableBody.innerHTML = `
            <tr>
                <td>Queried Number</td>
                <td>${data.query_value || number}</td>
            </tr>
            <tr>
                <td>Status</td>
                <td>${data.success ? "Success" : "No Data"}</td>
            </tr>
            <tr>
                <td>Circle</td>
                <td>${data.first_match?.circle || "N/A"}</td>
            </tr>
        `;

        document.getElementById("result").style.display = "block";

    } catch (e) {
        document.getElementById("error").innerText = "Failed to fetch data.";
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
