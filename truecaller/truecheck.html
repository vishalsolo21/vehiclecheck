<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Data Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    width:95%;
    max-width:600px;
    margin:20px auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

#loading{
    margin-top:15px;
    text-align:center;
    display:none;
}

#result{
    margin-top:20px;
}

pre{
    background:#111827;
    color:#22c55e;
    padding:15px;
    border-radius:10px;
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
    font-size:13px;
}

.footer{
    margin-top:auto;
    text-align:center;
    padding:15px;
    color:#94a3b8;
}

.footer span{
    color:#22c55e;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <h1>📱 Mobile Data Checker</h1>

        <div class="input-group">
            <input
                type="text"
                id="number"
                maxlength="10"
                placeholder="Enter 10 Digit Number">
            <button onclick="checkData()">Search</button>
        </div>

        <div id="loading">Fetching data...</div>

        <div id="result"></div>

    </div>
</div>

<div class="footer">
    Made with ❤️ by Vishal |
    <span>RAIGANJLOOTERS</span>
</div>

<script>
async function checkData(){

    const number =
        document.getElementById("number").value.trim();

    const result =
        document.getElementById("result");

    if(!/^[0-9]{10}$/.test(number)){
        result.innerHTML =
            "<pre>Please enter a valid 10 digit number.</pre>";
        return;
    }

    document.getElementById("loading").style.display =
        "block";

    result.innerHTML = "";

    try{

        const response = await fetch(`/api/check?number=${number}`);

const text = await response.text();

console.log(text);

document.getElementById("result").innerHTML =
    `<pre>${text}</pre>`;
    }
    catch(error){

        document.getElementById("loading").style.display =
            "none";

        result.innerHTML =
            `<pre>Error:\n${escapeHtml(error.toString())}</pre>`;
    }
}

function escapeHtml(text){
    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
