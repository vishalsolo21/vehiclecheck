<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Data Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    max-width:500px;
    width:95%;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

#loading{
    text-align:center;
    margin-top:15px;
    display:none;
}

.result{
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    background:#0f172a;
    border-radius:10px;
    overflow:hidden;
}

td{
    padding:10px;
    border-bottom:1px solid #334155;
    word-break:break-word;
}

td:first-child{
    font-weight:bold;
    width:35%;
    color:#38bdf8;
}

.highlight{
    background:#14532d;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}

.footer{
    text-align:center;
    padding:15px;
    color:#94a3b8;
    margin-top:auto;
}

.footer span{
    color:#22c55e;
    font-weight:bold;
}

.error{
    color:#ef4444;
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📱 Mobile Data Checker</h1>

        <div class="input-group">
            <input type="text" id="number" maxlength="10" placeholder="Enter 10 Digit Number">
            <button onclick="checkData()">Search</button>
        </div>

        <div id="loading">🔍 Fetching data...</div>

        <div class="result" id="result"></div>
    </div>
</div>

<div class="footer">
    Made with ❤️ by Vishal |
    <span>RAIGANJLOOTERS</span>
</div>

<script>
async function checkData() {

    const number = document.getElementById("number").value.trim();
    const resultDiv = document.getElementById("result");

    if(!/^[0-9]{10}$/.test(number)){
        resultDiv.innerHTML =
        '<div class="error">Enter a valid 10 digit number</div>';
        return;
    }

    document.getElementById("loading").style.display = "block";
    resultDiv.innerHTML = "";

    try{

        const api =
        `https://ye-lo-mojkro.noob73613.workers.dev/?api_key=@noob11001&number=${number}`;

        const response = await fetch(api);
        const data = await response.json();

        document.getElementById("loading").style.display = "none";

        if(!data.success || !data.results || data.results.length === 0){
            resultDiv.innerHTML =
            '<div class="error">No Data Found</div>';
            return;
        }

        let html = `
        <div class="highlight">
            ${data.highlight || "Result Found"}
        </div>
        `;

        data.results.forEach((item,index)=>{

            html += `
            <h3 style="margin-top:15px;color:#22c55e">
                Result ${index+1}
            </h3>

            <table>
                <tr>
                    <td>Mobile</td>
                    <td>${item.mobile || "-"}</td>
                </tr>

                <tr>
                    <td>Name</td>
                    <td>${item.name || "-"}</td>
                </tr>

                <tr>
                    <td>Father Name</td>
                    <td>${item.fname || "-"}</td>
                </tr>

                <tr>
                    <td>Address</td>
                    <td>${item.address || "-"}</td>
                </tr>

                <tr>
                    <td>Alternate</td>
                    <td>${item.alt || "-"}</td>
                </tr>

                <tr>
                    <td>Circle</td>
                    <td>${item.circle || "-"}</td>
                </tr>

                <tr>
                    <td>ID</td>
                    <td>${item.id || "-"}</td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td>${item.email || "-"}</td>
                </tr>
            </table>
            `;
        });

        resultDiv.innerHTML = html;

    }catch(error){

        document.getElementById("loading").style.display = "none";

        resultDiv.innerHTML =
        '<div class="error">Failed to fetch data.</div>';

        console.error(error);
    }
}
</script>

</body>
</html>
