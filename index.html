<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Details Checker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:70%;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    font-size:16px;
    cursor:pointer;
}

pre{
    background:#eee;
    padding:15px;
    border-radius:5px;
    overflow:auto;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="container">
    <h2>Vehicle Details Checker</h2>

    <input type="text" id="vehicleNo" placeholder="Enter Vehicle Number (e.g. RJ14CV0002)">
    <button onclick="getVehicleDetails()">Check</button>

    <h3>Result:</h3>
    <pre id="result">No data fetched yet.</pre>
</div>

<script>
async function getVehicleDetails() {

    const vehicleNo = document.getElementById("vehicleNo").value.trim().toUpperCase();

    if(!vehicleNo){
        alert("Please enter a vehicle number");
        return;
    }

    const url =
    `https://app.turtlemintinsurance.com/api/findregistrationresult?registration=${vehicleNo}&vertical=FW`;

    try {

        document.getElementById("result").textContent = "Loading...";

        const response = await fetch(url);

        if(!response.ok){
            throw new Error("Request failed");
        }

        const data = await response.json();

        document.getElementById("result").textContent =
            JSON.stringify(data, null, 2);

    } catch(error){

        document.getElementById("result").textContent =
            "Error: " + error.message;

        console.error(error);
    }
}
</script>

</body>
</html>
