<script>
async function getVehicleDetails(){

    const vehicleNo =
        document.getElementById("vehicleNo")
        .value
        .trim()
        .toUpperCase();

    if(!vehicleNo){
        alert("Enter vehicle number");
        return;
    }

    const url =
    `https://app.turtlemintinsurance.com/api/findregistrationresult?registration=${vehicleNo}&vertical=FW`;

    document.getElementById("loading").innerHTML =
    "Fetching vehicle details...";

    document.getElementById("resultCard").style.display =
    "none";

    try{

        const response = await fetch(url);
        const data = await response.json();

        const tbody =
        document.getElementById("resultBody");

        tbody.innerHTML = "";

        function addRows(obj,prefix=""){

            for(let key in obj){

                if(typeof obj[key] === "object" &&
                   obj[key] !== null){

                    addRows(obj[key], key + " ");

                }else{

                    tbody.innerHTML += `
                    <tr>
                        <td>${prefix}${key}</td>
                        <td>${obj[key]}</td>
                    </tr>`;
                }
            }
        }

        addRows(data);

        document.getElementById("resultCard")
        .style.display = "block";

        document.getElementById("loading")
        .innerHTML = "";

    }catch(err){

        document.getElementById("loading")
        .innerHTML =
        '<div class="error">Unable to fetch data.</div>';

        console.error(err);
    }
}
</script>

<body>

<div class="container">
    <h2>Vehicle Details Checker</h2>

    <input type="text" id="vehicleNo" placeholder="Enter Vehicle Number (e.g. RJ14CV0002)">
    <button onclick="getVehicleDetails()">Check</button>

    <h3>Result:</h3>
    <pre id="result">No data fetched yet.</pre>
</div>

<script>
async function getVehicleDetails() {

    const vehicleNo = document.getElementById("vehicleNo").value.trim().toUpperCase();

    if(!vehicleNo){
        alert("Please enter a vehicle number");
        return;
    }

    const url =
    `https://app.turtlemintinsurance.com/api/findregistrationresult?registration=${vehicleNo}&vertical=FW`;

    try {

        document.getElementById("result").textContent = "Loading...";

        const response = await fetch(url);

        if(!response.ok){
            throw new Error("Request failed");
        }

        const data = await response.json();

        document.getElementById("result").textContent =
            JSON.stringify(data, null, 2);

    } catch(error){

        document.getElementById("result").textContent =
            "Error: " + error.message;

        console.error(error);
    }
}
</script>

</body>
